name: CLA Assistant

# PILOT: org-level reusable-workflow caller (scitex-ai/.github, 2026-07-10).
# Triggers/permissions preserved verbatim from the prior local file.
# Reusable workflow defaults (owner_login=ywatanabe1989, default_branch=main)
# already match this repo's prior hardcoded values; owner_allowlist IS
# overridden below because this repo's allowlist has an extra entry
# (LLEmacs) beyond the "bot*,ywatanabe1989" default.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  call:
    uses: scitex-ai/.github/.github/workflows/cla.yml@main
    secrets: inherit
    with:
      owner_allowlist: "bot*,ywatanabe1989,LLEmacs"